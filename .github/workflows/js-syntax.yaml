on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: JavaScript-syntax

permissions: read-all

jobs:
  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check builder and runtime JavaScript
        run: |
          node --check inst/builder/www/builder.js
          node --check inst/export/assets/blinkdash.js
          node --check inst/export/assets/webr-bridge.js
